name: CI

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install tox
        run: pip install tox

      - name: Run package tests
        run: tox -e test_package

  build-wheel:
    runs-on: ubuntu-latest
    needs: test

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Build wheel
        run: |
          pip install build
          python -m build --wheel --outdir dist

      - name: Upload wheel artifact
        uses: actions/upload-artifact@v4
        with:
          name: scoliosis-ai-wheel
          path: dist/*.whl
          retention-days: 7
