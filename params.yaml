data:
  raw_dir: data/raw
  processed_dir: data/processed
  test_size: 0.2
  random_seed: 42

train:
  epochs: 50
  batch_size: 4
  learning_rate: 0.001
  optimizer: adam

model:
  architecture: resnet50
  num_classes: 2
  pretrained: true

mlflow:
  experiment_name: scoliosis-detection
  tracking_uri: http://localhost:5000
