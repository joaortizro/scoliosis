version: "3.9"

services:
  mlflow:
    image: ghcr.io/mlflow/mlflow:latest
    ports:
      - "5000:5000"
    volumes:
      - ./mlflow/mlruns:/mlruns
    command: mlflow server --host 0.0.0.0 --port 5000 --backend-store-uri /mlruns

  server:
    build: .
    ports:
      - "8000:8000"
    volumes:
      - .:/app
    env_file:
      - .env
    depends_on:
      - mlflow
    command: uvicorn server.main:app --host 0.0.0.0 --port 8000 --reload

  front:
    build: ./front
    ports:
      - "3000:3000"
    depends_on:
      - server
