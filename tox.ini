[tox]
envlist = test_package, test_api, train
skipsdist = true

# ── Run unit tests for the ai/ package ────────────────────────────────────────
[testenv:test_package]
deps =
    -r requirements.txt
    pytest
commands =
    pytest tests/ -v

# ── Run unit tests for the API server ─────────────────────────────────────────
[testenv:test_api]
deps =
    -r requirements.txt
    pytest
    httpx
commands =
    pytest tests/ -v -k "api"

# ── Run the full DVC training pipeline ────────────────────────────────────────
[testenv:train]
deps =
    -r requirements.txt
commands =
    dvc repro

# ── Run the API server locally ────────────────────────────────────────────────
[testenv:run]
deps =
    -r requirements.txt
commands =
    uvicorn server.main:app --host 0.0.0.0 --port 8001 --reload
